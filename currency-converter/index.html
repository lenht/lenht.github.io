<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        
        <title>Currency Converter</title>

        <!-- Google Fonts -->
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
            rel="stylesheet"
        />

         <!-- Font Awesome-->
         <link 
         rel="stylesheet"
         href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
        />  

        <!-- Stylesheet -->
        <link rel="stylesheet" href="style.css"/>
    </head>

    <body>
        <div class="wrapper">
            <div class="app-details">
                <img src="app-icon.avif" class="app-icon"/>
                <h1 class="app-title">Currency Converter</h1>
            </div>

            <label for="amount">Amount:</label>
            <input type="number" id="amount" value="100">
            
            <div class="dropdowns">
                <select id="from-currency-select"></select>
                <select id="to-currency-select"></select>
            </div>

            <button id="convert-button">Convert</button>

            <p id="result"></p>
        </div>

        <!-- Script with Array of Supported Country Codes -->
        <script src="currency-codes.js"></script>

        <!-- Script with API Key -->
        <script src="api-key.js"></script>

        <!-- Script -->
        <script src="script.js"></script>
    </body>
</html>
