<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

        <title>Product Filter And Search</title>

        <!-- Google Font -->
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap"
            rel="stylesheet"
        />
        
        <!-- Stylesheet -->
        <link rel="stylesheet" href="style.css"/>
    </head>

    <body>
        <div class="wrapper">
            <div id="search-container">
                <input 
                    type="search"
                    id="search-input"
                    placeholder="Search product name here..."
                />

                <button id="search">Search</button>
            </div>

            <div id="category-buttons">
                <button class="categories" onclick="filterProduct('All')">All</button>
                <button class="categories" onclick="filterProduct('Seaweed')">Seaweed</button>
                <button class="categories" onclick="filterProduct('Candy')">Candy</button>
                <button class="categories" onclick="filterProduct('Jelly')">Jelly</button>
                <button class="categories" onclick="filterProduct('Drinks')">Drinks</button>
                <button class="categories" onclick="filterProduct('Chestnuts')">Chestnuts</button>
                <!--<button class="categories" onclick="filterProduct('noodles')">Noodles</button>-->
            </div>

            <div id="products"></div>
        </div>

        <!-- Script -->
        <script src="script.js"></script>

    </body>    

</html>
