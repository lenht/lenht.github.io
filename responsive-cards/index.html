<!DOCTYPE html>
<html>
    <head>
        <title>Responsive Grid Cards</title>

        <!-- Google Fonts -->

        rel ="stylesheet"/>

        <!-- Stylesheet -->
        <link href="style.css" rel="stylesheet"/>
    </head>

    <body>
        <div class="cards">

                </div>

                    <h3>GRAPE FLAVORED BEVERAGE 180ML</h3>

            <dive class ="card card2">

                </div>

                    <h3>POMEGRANATE FLAVORED BEVERAGE 180ML</h3>
                    <p>$0.85</p>
                </div>
            </dive>

            <dive class ="card card3">
                <div class ="container">
                    <img src="../product-filter/8801382134480.jpg" alt="Apple Flavored Beverage 180ml">
                </div>
                <div class="details">
                    <h3>APPLE FLAVORED BEVERAGE 180ML</h3>
                    <p>$0.85</p>

</html>
